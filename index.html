<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK BOX 廠務營運與技術綜合控制台 V7.3</title>
    <style>
        /* 1. 全域大版面配置 - 確保字體氣勢與寬敞感 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部深藍標頭列 */
        header {
            background-color: #132a3a;
            color: #ffffff;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 1.3rem; font-weight: bold; letter-spacing: 0.5px; }
        
        .status-zone { display: flex; gap: 12px; align-items: center; }
        .active-tag { background-color: rgba(245,158,11,0.2); border: 1px solid #f59e0b; color: #fbbf24; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .sync-tag { background-color: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #34d399; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }

        /* 雙縱列大戰情室 */
        .dashboard-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 60px);
        }

        .column { display: flex; flex-direction: column; gap: 16px; height: 100%; overflow: hidden; }
        .h-55 { flex: 1.1; }
        .h-45 { flex: 0.9; }

        .card { background: #ffffff; border-radius: 8px; border: 1px solid #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background-color: #ffffff; padding: 12px 16px; font-size: 1.05rem; font-weight: bold; color: #0f172a; border-bottom: 2px solid #e2e8f0; }
        .card-body { padding: 12px; flex: 1; overflow: hidden; }

        /* 2. 網格骨架配置 */
        .grid-layout { display: grid; gap: 12px; height: 100%; width: 100%; }
        .grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        
        /* 右上角大便簽非對稱切割 */
        .grid-split-three {
            grid-template-columns: 1.2fr 0.8fr;
            grid-template-rows: 1fr 1fr;
        }

        .unit-cell { display: flex; flex-direction: column; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; }
        .unit-header { padding: 6px 10px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unit-divider { height: 1px; background-color: #cbd5e1; }
        .unit-content { flex: 1; padding: 10px; font-size: 0.9rem; line-height: 1.5; color: #334155; background: #ffffff; white-space: pre-wrap; overflow-y: auto; }

        /* 職能美學配色 */
        .cell-sa { border-color: #bae6fd; }
        .cell-sa .unit-header { background: #e0f2fe; color: #0369a1; }
        .cell-factory { border-color: #bbf7d0; }
        .cell-factory .unit-header { background: #dcfce7; color: #15803d; }
        
        /* 大便簽三格均維持溫潤米色 */
        .cell-beige-main { border-color: #fde68a; grid-row: 1 / 3; }
        .cell-beige-main .unit-header { background: #fef3c7; color: #92400e; }
        .cell-beige-main .unit-content { background: #fdfbf7; color: #451a03; }
        
        .cell-beige-sub { border-color: #fde68a; }
        .cell-beige-sub .unit-header { background: #fef3c7; color: #92400e; }
        .cell-beige-sub .unit-content { background: #fdfbf7; color: #451a03; }

        /* 3. 左下核心資安區 - 10組無捲軸明文直顯排列 */
        .cred-compact-container { display: flex; flex-direction: column; height: 100%; gap: 3px; }
        .cred-row {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border-left: 4px solid #475569;
            border-radius: 0 4px 4px 0;
            padding: 0 8px;
            height: 23px; 
            justify-content: space-between;
            font-size: 0.82rem;
        }
        .cred-main { display: flex; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
        .sys-title { font-weight: bold; color: #0f172a; width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cred-vals { color: #64748b; white-space: nowrap; }
        .cred-vals b { color: #ef4444; background: #f1f5f9; padding: 0 4px; border-radius: 3px; font-weight: bold; }
        
        .cred-btns { display: flex; gap: 4px; }
        .mini-btn {
            background-color: #3b82f6; color: white; border: none; padding: 1px 6px; 
            border-radius: 3px; font-size: 0.7rem; font-weight: bold; cursor: pointer;
        }
        .mini-btn.pwd { background-color: #10b981; }
        .mini-btn.link { background-color: #6366f1; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>⚙️ BLACK BOX 廠務營運與技術綜合控制台 (V7.3 終極完美對接版)</h1>
        <div class="status-zone">
            <div class="sync-tag" id="sync-status">雲端對接中...</div>
            <div class="active-tag" id="live-date">載入中...</div>
        </div>
    </header>

    <div class="dashboard-container">
        
        <div class="column">
            <div class="card h-55">
                <div class="card-header">📋 SA 接待區域與重要注意事項</div>
                <div class="card-body">
                    <div class="grid-layout grid-4">
                        <div class="unit-cell cell-sa"><div class="unit-header" id="sa_h1">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="sa_c1">...</div></div>
                        <div class="unit-cell cell-sa"><div class="unit-header" id="sa_h2">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="sa_c2">...</div></div>
                        <div class="unit-cell cell-sa"><div class="unit-header" id="sa_h3">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="sa_c3">...</div></div>
                        <div class="unit-cell cell-sa"><div class="unit-header" id="sa_h4">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="sa_c4">...</div></div>
                    </div>
                </div>
            </div>

            <div class="card h-45">
                <div class="card-header">🔒 核心系統資安庫 (10組配置 / 明文直顯 / 一鍵複製)</div>
                <div class="card-body" id="credentials-target">
                    <div style="text-align:center; padding-top:50px; color:#94a3b8;">數位防線連線中...</div>
                </div>
            </div>
        </div>

        <div class="column">
            <div class="card h-55">
                <div class="card-header">📝 營運對帳與團隊異動大便簽</div>
                <div class="card-body">
                    <div class="grid-layout grid-split-three">
                        <div class="unit-cell cell-beige-main">
                            <div class="unit-header" id="rt_h1">載入中...</div>
                            <div class="unit-divider"></div>
                            <div class="unit-content" id="rt_c1">正在同步雲端筆記...</div>
                        </div>
                        <div class="unit-cell cell-beige-sub">
                            <div class="unit-header" id="rt_h2">載入中...</div>
                            <div class="unit-divider"></div>
                            <div class="unit-content" id="rt_c2">...</div>
                        </div>
                        <div class="unit-cell cell-beige-sub">
                            <div class="unit-header" id="rt_h3">載入中...</div>
                            <div class="unit-divider"></div>
                            <div class="unit-content" id="rt_c3">...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card h-45">
                <div class="card-header">🛠️ 廠務即時調度、排休異動四格板</div>
                <div class="card-body">
                    <div class="grid-layout grid-4">
                        <div class="unit-cell cell-factory"><div class="unit-header" id="f_h1">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="f_c1">...</div></div>
                        <div class="unit-cell cell-factory"><div class="unit-header" id="f_h2">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="f_c2">...</div></div>
                        <div class="unit-cell cell-factory"><div class="unit-header" id="f_h3">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="f_c3">...</div></div>
                        <div class="unit-cell cell-factory"><div class="unit-header" id="f_h4">載入中...</div><div class="unit-divider"></div><div class="unit-content" id="f_c4">...</div></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const SPREADSHEET_ID = '1lwByNWi7pOkl6hBV--15-_c4n2NaaAlWnVjY44itnlw';

        function updateDate() {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit', weekday:'long'});
        }
        updateDate();
        setInterval(updateDate, 60000);

        function copy(txt) {
            if(!txt || txt === '未設定' || txt === '-') return;
            navigator.clipboard.writeText(txt);
        }

        function go(url) {
            if(!url || url === '未設定' || url === '-') return;
            window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
        }

        // 高階高防呆 CSV 雙重斷行解析引擎
        function parseAdvancedCSV(csvText) {
            const lines = [];
            let currentLine = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"'; i++; // 處理雙引號轉義
                    } else {
                        inQuotes = !inQuotes; // 切換引號狀態
                    }
                } else if (char === ',' && !inQuotes) {
                    currentLine.push(currentCell.trim());
                    currentCell = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') i++;
                    currentLine.push(currentCell.trim());
                    if (currentLine.length > 0 && currentLine[0] !== '') {
                        lines.push(currentLine);
                    }
                    currentLine = [];
                    currentCell = '';
                } else {
                    currentCell += char;
                }
            }
            if (currentCell || currentLine.length > 0) {
                currentLine.push(currentCell.trim());
                lines.push(currentLine);
            }
            return lines;
        }

        async function sync() {
            try {
                // A. 讀取並渲染 11 宮格資料
                const urlNotes = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=SA_Factory_Notes`;
                const resNotes = await fetch(urlNotes);
                const csvNotes = await resNotes.text();
                
                const parsedNotes = parseAdvancedCSV(csvNotes).slice(1); // 移除標頭
                
                parsedNotes.forEach(cols => {
                    if (cols.length < 2) return;
                    const id = cols[0].trim();
                    const title = cols[1];
                    const content = cols[2] || '';

                    // 動態對齊前端 DOM 節點
                    const targetContentId = id.replace('rt_','rt_c').replace('sa_','sa_c').replace('f_','f_c');
                    const targetHeaderId = id.replace('1','h1').replace('2','h2').replace('3','h3').replace('4','h4');
                    
                    const hEl = document.getElementById(targetHeaderId);
                    const cEl = document.getElementById(targetContentId);
                    
                    if(hEl) hEl.innerText = title || '';
                    if(cEl) cEl.innerText = content || '';
                });

                // B. 讀取並渲染 10 組核心資安庫
                const urlCreds = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=Credentials`;
                const resCreds = await fetch(urlCreds);
                const csvCreds = await resCreds.text();
                
                const parsedCreds = parseAdvancedCSV(csvCreds).slice(1, 11); // 精準抽取前 10 筆
                
                let html = '<div class="cred-compact-container">';
                parsedCreds.forEach(cols => {
                    if(cols.length < 2) return;
                    
                    const sys = cols[1] || '未設定';
                    const url = cols[2] || '-';
                    const user = cols[3] || '-';
                    const pass = cols[4] || '-';

                    html += `
                    <div class="cred-row">
                        <div class="cred-main">
                            <span class="sys-title">🖥️ ${sys}</span>
                            <span class="cred-vals">帳: ${user} | 密: <b>${pass}</b></span>
                        </div>
                        <div class="cred-btns">
                            <button class="mini-btn" onclick="copy('${user}')">帳</button>
                            <button class="mini-btn pwd" onclick="copy('${pass}')">密</button>
                            <button class="mini-btn link" onclick="go('${url}')">🌐</button>
                        </div>
                    </div>`;
                });
                html += '</div>';
                document.getElementById('credentials-target').innerHTML = html;

                document.getElementById('sync-status').innerText = '🛡️ 雲端資安已聯動';
                document.getElementById('sync-status').style.color = '#34d399';
            } catch (e) {
                console.error(e);
                document.getElementById('sync-status').innerText = '❌ 同步異常';
                document.getElementById('sync-status').style.color = '#ef4444';
            }
        }

        sync();
        setInterval(sync, 300000); // 每 5 分鐘後台輪詢自動更新
    </script>
</body>
</html>
